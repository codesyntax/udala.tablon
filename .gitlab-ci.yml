# Generated from:
# https://github.com/plone/meta/tree/main/config/default
# See the inline comments on how to expand/tweak this configuration file
image: python:3.11-bullseye
##
# Add extra configuration options in .meta.toml:
#  [gitlab]
#  custom_image = "python:3.11-bullseye"
##

stages:
  - qa
  - test

##
# To modify the list of default jobs being created add in .meta.toml:
# [gitlab]
# jobs = [
#    "lint",
#    "release-ready",
#    "dependencies",
#    "circular-dependencies",
#    "testing",
#    "coverage",
#    ]
##

##
# JOBS
##
lint:
  stage: qa
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - pip install tox
    - tox -e lint
  except:
    - schedules

release-ready:
  stage: qa
  script:
    - pip install tox
    - tox -e release-check
  except:
    - schedules

dependencies:
  stage: qa
  script:
    - pip install tox
    - tox -e dependencies
  except:
    - schedules

circular-dependencies:
  stage: qa
  script:
    - apt-get update
    - apt-get install -y graphviz graphviz-dev
    - pip install tox
    - tox -e circular
  except:
    - schedules

testing:
  stage: test
  script:

    - pip install tox
    - tox -e test -- --xml reports
  artifacts:
      when: always
      reports:
        junit:
          - reports/testreports/*.xml

##
# Add extra test/coverage commands in .meta.toml:
#  [gitlab]
#  os_dependencies = """
#      - apt-get install libxslt libxml2
#  """
##
  except:
    - schedules

coverage:
  stage: test
  script:

    - pip install tox
    - tox -e coverage
##
# Add extra test/coverage commands in .meta.toml:
#  [gitlab]
#  os_dependencies = """
#      - apt-get install libxslt libxml2
#  """
##
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/TOTAL.* \*\*(\d+)\%\*\*/'
  except:
    - schedules


